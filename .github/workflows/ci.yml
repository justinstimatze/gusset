name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: # on-demand full cross-OS run

permissions:
  contents: read

jobs:
  # Compute the test matrix: Linux on every push/PR, but the billed-at-10×
  # macOS and 2× Windows runners only on tags or a manual dispatch. This keeps
  # routine pushes to a single ubuntu runner; cross-OS is a release-time gate.
  setup:
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.pick.outputs.os }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            echo 'os=["ubuntu-latest","macos-latest","windows-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.setup.outputs.os) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./...
      - name: Format check
        shell: bash # windows-latest defaults to PowerShell; this step is POSIX sh
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt -l found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: Test
        run: go test -race ./...
      - name: Build (stripped)
        run: go build -ldflags="-s -w" -v ./cmd/gusset

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: ./scripts/govulncheck.sh

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: extension/.nvmrc # single source of truth (matches release.yml)
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - name: Lint & format (Biome)
        run: npx biome check --diagnostic-level=error .
      - name: Typecheck
        run: npm run compile
      - name: Test
        run: npm test
      - name: Build (Firefox MV3)
        run: npm run build:firefox
