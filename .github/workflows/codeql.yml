name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read # a job-level permissions block replaces the top-level one,
                     # so checkout needs contents re-granted here or it 404s on a
                     # private repo ("Repository not found").
      actions: read  # required on PRIVATE repos: the upload step queries the
                     # workflow-run API; without it the SARIF upload fails with
                     # "Resource not accessible by integration". Harmless public.
      security-events: write # upload results to the Security tab
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - name: Initialize CodeQL
        uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          languages: go
      - name: Autobuild
        uses: github/codeql-action/autobuild@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
      - name: Analyze
        uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
