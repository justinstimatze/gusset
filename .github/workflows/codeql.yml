name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read # a job-level permissions block replaces the top-level one,
                     # so checkout needs contents re-granted here or it 404s on a
                     # private repo ("Repository not found").
      actions: read  # required on PRIVATE repos: the upload step queries the
                     # workflow-run API; without it the SARIF upload fails with
                     # "Resource not accessible by integration". Harmless public.
      security-events: write # upload results to the Security tab
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: go
      - name: Autobuild
        uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
      - name: Analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
