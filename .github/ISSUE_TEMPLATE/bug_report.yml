name: Bug report
description: Something gusset did wrong (not a security vulnerability — see SECURITY.md for those)
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. gusset ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: gusset version
      description: Output of `gusset version`.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Any error text or `gusset status` output. Do not paste your passphrase.
      render: shell
